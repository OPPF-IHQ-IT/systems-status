name: Rebuild Site After Uptime CI

on:
  workflow_run:
    workflows: ["Uptime CI"]
    types: [completed]

jobs:
  trigger-site-rebuild:
    name: Trigger static site rebuild
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      # Uptime CI only commits when an endpoint's status or history actually
      # changes, so master moving past the SHA the run started from is our
      # "something changed" signal. Rebuilding otherwise just burns API quota
      # against the shared 5,000/hr limit for the GH_PAT owner.
      - name: Check whether Uptime CI committed anything
        id: check
        run: |
          started_at="${{ github.event.workflow_run.head_sha }}"
          current="$(git rev-parse HEAD)"
          if [ "$current" = "$started_at" ]; then
            echo "No new commits since $started_at; skipping rebuild."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "master advanced $started_at -> $current"
            git log --oneline "$started_at..$current" || true
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Static Site CI
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'static_site',
            });
