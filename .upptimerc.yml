owner: OPPF-IHQ-IT
repo: systems-status

user-agent: fraternity-it-status

sites:
  - name: iMIS Authentication
    url: https://$OBSERVABILITY_HOST/health/imis/auth
    expectedStatusCodes:
      - 200
    maxResponseTime: 15000
    headers:
      - "Authorization: Bearer $UPPTIME_HEALTH_TOKEN"

  - name: iMIS IQA
    url: https://$OBSERVABILITY_HOST/health/imis/iqa
    expectedStatusCodes:
      - 200
    maxResponseTime: 15000
    headers:
      - "Authorization: Bearer $UPPTIME_HEALTH_TOKEN"

  - name: Chapter Roster Report
    url: https://$OBSERVABILITY_HOST/health/imis/reports/chapter-roster
    expectedStatusCodes:
      - 200
    maxResponseTime: 20000
    headers:
      - "Authorization: Bearer $UPPTIME_HEALTH_TOKEN"

  - name: Financial Summary Report
    url: https://$OBSERVABILITY_HOST/health/imis/reports/financial-summary
    expectedStatusCodes:
      - 200
    maxResponseTime: 20000
    headers:
      - "Authorization: Bearer $UPPTIME_HEALTH_TOKEN"

  - name: Zendesk API
    url: https://$OBSERVABILITY_HOST/health/zendesk/api
    expectedStatusCodes:
      - 200
    maxResponseTime: 10000
    headers:
      - "Authorization: Bearer $UPPTIME_HEALTH_TOKEN"

assignees:
  - willmadison

status-website:
  cname: status.wrmj.io
  name: Fraternity IT Service Status
  logoUrl: https://oppf.org/wp-content/uploads/oppf-shield-web-2.png
  introTitle: "Fraternity IT Service Status"
  introMessage: "Current availability and service health for fraternity IT systems, iMIS reports, support operations, and member-facing platforms."
  navbar:
    - title: Status
      href: /
    - title: Support
      href: mailto:it-support@wrmj.io
  customCss: |
    body { background: #f8f7fc !important; color: #222 !important; }
    .header { background: #2E1E4A !important; border-bottom: 3px solid #FCBA00 !important; }
    .header a, .header nav a { color: #FCBA00 !important; }
    .header .logo-text { color: #ffffff !important; font-weight: 600 !important; }
    h1 { color: #2E1E4A !important; }
    h2 { color: #4b307b !important; }
    a { color: #4b307b !important; }
    a:hover { color: #2E1E4A !important; }
    .status-page { background: #f8f7fc !important; }
    .card { background: #ffffff !important; border: 1px solid #e5e0f0 !important; }
    .pill-good, [class*="badge"][class*="up"] { background: #16a34a !important; }
    .pill-degraded, [class*="badge"][class*="degraded"] { background: #d97706 !important; }
    .pill-bad, [class*="badge"][class*="down"] { background: #dc2626 !important; }
    footer { background: #2E1E4A !important; color: #e5e0f0 !important; }
    footer a { color: #FCBA00 !important; }

# Required GitHub Actions secrets for this repo:
#   OBSERVABILITY_HOST  — hostname of the observability bridge (e.g. observability.wrmj.io)
#   UPPTIME_HEALTH_TOKEN — bearer token matching the bridge's UPPTIME_HEALTH_TOKEN secret
