owner: OPPF-IHQ-IT
repo: systems-status

user-agent: fraternity-it-status

sites:
  - name: Conclave Dashboard
    url: https://85thconclave-dashboard.oppf.org/healthz.php
    expectedStatusCodes:
      - 200
    maxResponseTime: 10000

  - name: Membership API v2
    url: https://membership.oppf.org/healthz
    expectedStatusCodes:
      - 200
    maxResponseTime: 10000

  # iMIS-hosted: an unauthenticated request 302-redirects to the login page, which is the healthy "up" response.
  - name: Member Portal
    url: https://members.oppf.org
    expectedStatusCodes:
      - 200
      - 302
    maxResponseTime: 10000

  # www 301-redirects to the canonical apex (oppf.org).
  - name: Public Website
    url: https://www.oppf.org
    expectedStatusCodes:
      - 200
      - 301
    maxResponseTime: 10000

  # iMIS-hosted: 302-redirects to the login page when unauthenticated.
  - name: Special Events Checklist
    url: https://sec.oppf.org
    expectedStatusCodes:
      - 200
      - 302
    maxResponseTime: 10000

  - name: Recommendations Hub
    url: https://recommendations.oppf.org/api/health
    expectedStatusCodes:
      - 200
    maxResponseTime: 10000

assignees:
  - willmadison

status-website:
  cname: status.oppf.org
  name: Fraternity IT Service Status
  logoUrl: https://oppf.org/wp-content/uploads/oppf-shield-web-2.png
  introTitle: "Fraternity IT Service Status"
  introMessage: "Current availability and service health for fraternity member-facing platforms and APIs."
  navbar:
    - title: Status
      href: /
    - title: Support
      href: mailto:support@oppf.org
  customCss: |
    :root {
      --body-background-color: #f8f7fc;
      --body-text-color: #1a1a2e;
      --card-background-color: #ffffff;
      --card-border-color: #e5e0f0;
      --nav-background-color: #2E1E4A;
      --nav-border-bottom-color: #FCBA00;
      --nav-current-border-bottom-color: #FCBA00;
      --up-border-left-color: #16a34a;
      --tag-up-background-color: #16a34a;
      --tag-color: #ffffff;
      --down-border-left-color: #dc2626;
      --down-background-color: #fee2e2;
      --tag-down-background-color: #dc2626;
      --degraded-border-left-color: #d97706;
      --tag-degraded-background-color: #d97706;
      --change-background-color: #FCBA00;
    }
    nav a { color: #FCBA00 !important; }
    nav .logo div { color: #ffffff !important; }
